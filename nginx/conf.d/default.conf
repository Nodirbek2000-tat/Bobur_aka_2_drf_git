# ===== HTTP (80) — ACME challenge + HTTPS ga yo'naltirish =====
server {
    listen 80;
    server_name sam-auth.uz www.sam-auth.uz;

    # Certbot tekshiruvi shu yo'l orqali o'tadi
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Qolgan hammasi HTTPS ga
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== HTTPS (443) — asosiy ilova =====
server {
    listen 443 ssl;
    http2 on;
    server_name sam-auth.uz www.sam-auth.uz;

    ssl_certificate     /etc/letsencrypt/live/sam-auth.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sam-auth.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 25M;

    # Statik fayllar (collectstatic natijasi)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Media (yuklangan rasmlar)
    location /media/ {
        alias /app/media/;
        expires 30d;
        access_log off;
    }

    # ACME challenge (yangilash uchun)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Django ilovasi
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
