<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — YouthGuard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
      <h1>YouthGuard</h1>
      <p>Yoshlar monitoring va nazorat tizimi</p>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-error" style="margin-bottom:16px">
          <i class="fas fa-exclamation-circle"></i> {{ msg }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user" style="color:var(--primary)"></i> Login</label>
        <input type="text" name="username" class="form-control" placeholder="Foydalanuvchi nomi" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock" style="color:var(--primary)"></i> Parol</label>
        <div style="position:relative">
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Parolni kiriting" required style="padding-right:44px">
          <button type="button" onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted)">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:8px">
        <i class="fas fa-sign-in-alt"></i> Tizimga kirish
      </button>
    </form>

    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center">
      <p style="font-size:13px;color:var(--text-muted)">
        <i class="fab fa-telegram" style="color:#2980b9"></i>
        Telegram bot orqali ham kirish mumkin
      </p>
    </div>
  </div>
</div>

{% load static %}
<script src="{% static 'js/main.js' %}"></script>
<script>
function togglePass() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
}
</script>
</body>
</html>
