<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>YouthGuard — Kirish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #000000);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .center { text-align: center; width: 100%; max-width: 360px; }
  .icon { font-size: 56px; margin-bottom: 16px; }
  .title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .sub { font-size: 14px; color: var(--tg-theme-hint-color, #888); margin-bottom: 24px; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(0,0,0,0.1);
    border-top-color: var(--tg-theme-button-color, #2196F3);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box {
    background: #ffeaea; border: 1px solid #ffcccc; border-radius: 12px;
    padding: 16px; color: #c0392b; font-size: 14px; margin-top: 16px; display: none;
  }
</style>
</head>
<body>
<div class="center">
  <div class="icon">🛡️</div>
  <div class="title">YouthGuard</div>
  <div class="sub">Telegram orqali kirish amalga oshirilmoqda...</div>
  <div class="spinner" id="spinner"></div>
  <div class="error-box" id="errBox"></div>
</div>

<script>
var twa = window.Telegram && window.Telegram.WebApp;

function showErr(msg) {
  document.getElementById('spinner').style.display = 'none';
  var eb = document.getElementById('errBox');
  eb.style.display = 'block';
  eb.textContent = msg;
}

if (!twa || !twa.initData) {
  showErr('Bu sahifa faqat Telegram ilovasidan ochilishi mumkin.');
} else {
  twa.ready();
  twa.expand();

  fetch('/uchrashuvlar/webapp/auth/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({initData: twa.initData}),
    credentials: 'include'
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.ok) {
      window.location.href = '/uchrashuvlar/webapp/uchrashuv/{{ meeting_pk }}/';
    } else {
      showErr(d.error || 'Kirish amalga oshmadi');
    }
  })
  .catch(function(e) { showErr('Tarmoq xatosi: ' + e.message); });
}
</script>
</body>
</html>
